name: Generate Snake Animation

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: vatsal3030
          outputs: |
            dist/snake-dark.svg?palette=github-dark
            dist/snake.gif?color_snake=%2300d9ff&color_dots=#0a0f1a,#0e2233,#124a5e,#1a7ea8,#00d9ff

      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          keep_history: false
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
