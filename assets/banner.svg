  <!-- ========== SHOOTING STARS ========== -->
  <!-- shooting star 1 — top arc -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;0.9;0.9;0" dur="8s" repeatCount="indefinite" begin="1s"/>
    <line x1="-60" y1="0" x2="0" y2="0" stroke="url(#shootGrad)" stroke-width="1.5" stroke-linecap="round">
      <animateMotion dur="8s" repeatCount="indefinite" begin="1s">
        <mpath href="#shootPath1"/>
      </animateMotion>
    </line>
  </g>

  <!-- shooting star 2 — bottom arc, offset timing -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;0;0.7;0.7;0" dur="11s" repeatCount="indefinite" begin="5s"/>
    <line x1="-40" y1="0" x2="0" y2="0" stroke="url(#shootGrad)" stroke-width="1.2" stroke-linecap="round">
      <animateMotion dur="11s" repeatCount="indefinite" begin="5s">
        <mpath href="#shootPath2"/>
      </animateMotion>
    </line>
  </g>

  <!-- ========== ACCENT LINE (shimmer) ========== -->
  <rect x="0" y="205" width="1200" height="1.5" fill="url(#lineShimmer)" opacity="0.8"/>

  <!-- ========== TEXT ========== -->
  <text x="600" y="130" text-anchor="middle" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="56" font-weight="800" fill="#ffffff" letter-spacing="6">
    VATSAL VADGAMA
  </text>

  <text x="600" y="170" text-anchor="middle" font-family="'Courier New', 'Fira Code', monospace" font-size="17" fill="#00d9ff" letter-spacing="3">
    BACKEND-FOCUSED FULL STACK DEVELOPER
  </text>

  <text x="600" y="235" text-anchor="middle" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="12.5" fill="#5a6a80" letter-spacing="2.5">
    NODE.JS · REACT · POSTGRESQL · REDIS · DOCKER · KUBERNETES
  </text>

  <!-- subtle bottom vignette -->
  <rect x="0" y="280" width="1200" height="40" fill="url(#bg)" opacity="0.5"/>
</svg>
