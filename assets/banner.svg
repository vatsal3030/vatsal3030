    <circle cx="50" cy="305" r="0.7"><animate attributeName="opacity" values="1;0.15;1" dur="3.7s" repeatCount="indefinite"/></circle>
    <circle cx="190" cy="265" r="1.3"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.9s" repeatCount="indefinite"/></circle>

