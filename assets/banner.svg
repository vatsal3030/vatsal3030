    <circle cx="880" cy="50" r="0.9"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.7s" repeatCount="indefinite"/></circle>
    <circle cx="920" cy="30" r="1.1"><animate attributeName="opacity" values="0.8;0.15;0.8" dur="4.4s" repeatCount="indefinite"/></circle>
