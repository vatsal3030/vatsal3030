    <circle cx="240" cy="255" r="0.9"><animate attributeName="opacity" values="0.6;1;0.6" dur="3.5s" repeatCount="indefinite"/></circle>
    <circle cx="300" cy="280" r="1.2"><animate attributeName="opacity" values="0.15;0.85;0.15" dur="4.0s" repeatCount="indefinite"/></circle>
    <circle cx="350" cy="240" r="1.0"><animate attributeName="opacity" values="0.9;0.2;0.9" dur="2.4s" repeatCount="indefinite"/></circle>
