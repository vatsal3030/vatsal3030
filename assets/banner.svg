<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="50%" stop-color="#060d1a"/>
      <stop offset="100%" stop-color="#0a0f1a"/>
    </linearGradient>

    <!-- accent line shimmer -->
    <linearGradient id="lineShimmer" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#000000" stop-opacity="0">
        <animate attributeName="stop-color" values="#000000;#00d9ff;#000000" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#00d9ff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0">
        <animate attributeName="stop-color" values="#000000;#00d9ff;#000000" dur="4s" repeatCount="indefinite" begin="2s"/>
      </stop>
    </linearGradient>

    <!-- nebula glow -->
    <radialGradient id="nebula" cx="50%" cy="48%" r="28%">
      <stop offset="0%" stop-color="#00d9ff" stop-opacity="0.08">
        <animate attributeName="stop-opacity" values="0.04;0.12;0.04" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="60%" stop-color="#00d9ff" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#00d9ff" stop-opacity="0"/>
    </radialGradient>

    <!-- shooting star gradient -->
    <linearGradient id="shootGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="70%" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00d9ff" stop-opacity="1"/>
    </linearGradient>

    <!-- shooting star path -->
    <path id="shootPath1" d="M -80,60 Q 400,100 1300,30" fill="none"/>
    <path id="shootPath2" d="M -60,280 Q 500,200 1300,250" fill="none"/>
  </defs>

  <!-- background -->
  <rect width="1200" height="320" fill="url(#bg)"/>

  <!-- nebula glow layer -->
  <rect width="1200" height="320" fill="url(#nebula)"/>

  <!-- ========== STARFIELD — 64 stars ========== -->
