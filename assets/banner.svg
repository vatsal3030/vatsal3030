    <!-- top-left cluster -->
    <circle cx="18" cy="12" r="1.0"><animate attributeName="opacity" values="0.1;0.9;0.1" dur="3.1s" repeatCount="indefinite"/></circle>
    <circle cx="55" cy="38" r="1.5"><animate attributeName="opacity" values="0.2;1;0.2" dur="4.0s" repeatCount="indefinite"/></circle>
    <circle cx="42" cy="82" r="0.8"><animate attributeName="opacity" values="0.8;0.15;0.8" dur="2.4s" repeatCount="indefinite"/></circle>
